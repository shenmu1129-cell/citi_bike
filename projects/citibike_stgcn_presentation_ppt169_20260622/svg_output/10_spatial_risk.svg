  <text x="714" y="130" font-family="Microsoft YaHei, Arial, sans-serif" font-size="32" font-weight="700" fill="#557F7C">最终结论</text>
  <text x="714" y="196" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#1D2433">
    <tspan x="714" dy="0">• 最高缺车和满桩风险集中在核心区域</tspan>
    <tspan x="714" dy="34">  40.76_-73.98。</tspan>
    <tspan x="714" dy="44">• 同一个区域在早高峰和晚高峰呈现</tspan>
    <tspan x="714" dy="34">  相反方向的车辆压力。</tspan>
    <tspan x="714" dy="44">• 模型输出可以直接转成“何时、何地、</tspan>
    <tspan x="714" dy="34">  做什么”的调度清单。</tspan>
  </text>
