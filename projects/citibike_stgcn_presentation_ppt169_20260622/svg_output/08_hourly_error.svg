<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#F8FAFC"/>
  <rect x="28" y="34" width="56" height="652" rx="18" fill="#E06A36"/>
  <text x="56" y="86" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF" text-anchor="middle">07</text>
  <text x="56" y="174" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">时</text>
  <text x="56" y="206" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">段</text>
  <text x="56" y="238" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">误</text>
  <text x="56" y="270" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">差</text>
  <rect x="108" y="58" width="750" height="430" rx="16" fill="#FFFFFF" stroke="#D8DEE5"/>
  <image href="../images/ppt_fig_07_hourly_error.png" x="126" y="78" width="714" height="390" preserveAspectRatio="xMidYMid meet"/>
  <rect x="892" y="82" width="300" height="340" rx="16" fill="#FFFFFF" stroke="#D8DEE5"/>
  <rect x="892" y="82" width="300" height="14" fill="#E06A36"/>
  <text x="924" y="142" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="700" fill="#E06A36">高峰更难预测</text>
  <text x="924" y="194" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#1D2433">
    <tspan x="924" dy="0">误差在早晚高峰升高，</tspan>
    <tspan x="924" dy="32">说明通勤时段的区域流入</tspan>
    <tspan x="924" dy="32">和流出更加集中，净流量</tspan>
    <tspan x="924" dy="32">极端值更多。</tspan>
  </text>
  <rect x="928" y="344" width="94" height="38" rx="19" fill="#28C0CD"/>
  <text x="975" y="369" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">08:00</text>
  <rect x="1042" y="344" width="94" height="38" rx="19" fill="#E06A36"/>
  <text x="1089" y="369" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">17:00</text>
  <rect x="108" y="538" width="1084" height="78" rx="16" fill="#FFFFFF" stroke="#D8DEE5"/>
  <text x="142" y="584" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="700" fill="#1D2433">这页自然过渡到调度风险：模型误差最高的时段，正好也是运营最需要提前介入的时段。</text>
  <text x="1190" y="670" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#586070" text-anchor="end">08</text>
</svg>
