  <rect x="716" y="68" width="470" height="470" rx="16" fill="#FFFFFF" stroke="#D8DEE5"/>
  <rect x="716" y="68" width="470" height="14" fill="#28C0CD"/>
  <text x="752" y="128" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="700" fill="#28C0CD">这张图怎么讲</text>
  <text x="752" y="184" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#1D2433">
    <tspan x="752" dy="0">• 点云沿对角线分布，说明预测值和真实值</tspan>
    <tspan x="752" dy="32">  整体方向一致。</tspan>
    <tspan x="752" dy="42">• 中心区域样本密度最高，表示大部分区域</tspan>
    <tspan x="752" dy="32">  小时净流量处于中低波动范围。</tspan>
    <tspan x="752" dy="42">• 极端正负净流量偏离更大，是高峰调度</tspan>
    <tspan x="752" dy="32">  风险识别的难点。</tspan>
  </text>
