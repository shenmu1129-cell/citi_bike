<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#F8FAFC" />
  <path fill="#28C0CD" d="M46,34 H66 A18,18 0 0 1 84,52 V668 A18,18 0 0 1 66,686 H46 A18,18 0 0 1 28,668 V52 A18,18 0 0 1 46,34 Z" />
  <text x="56" y="86" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF" text-anchor="middle">01</text>
  <text x="56" y="178" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">任</text>
  <text x="56" y="210" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">务</text>
  <text x="56" y="242" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">升</text>
  <text x="56" y="274" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">级</text>
  <g id="top-blocks">
    <path fill="#FFFFFF" stroke="#D8DEE5" d="M136,62 H454 A16,16 0 0 1 470,78 V236 A16,16 0 0 1 454,252 H136 A16,16 0 0 1 120,236 V78 A16,16 0 0 1 136,62 Z" />
    <text x="150" y="112" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="700" fill="#0C6DB8">不是预测全市订单</text>
    <text font-size="18" font-family="Microsoft YaHei, Arial, sans-serif" fill="#1D2433" x="150" y="158">城市级需求预测只能回答</text><text font-size="18" font-family="Microsoft YaHei, Arial, sans-serif" fill="#1D2433" x="150" y="188">“下一小时全市有多少订单”，</text><text font-size="18" font-family="Microsoft YaHei, Arial, sans-serif" fill="#1D2433" x="150" y="218">无法指导去哪补车或腾桩。</text><path fill="#28C0CD" d="M516,62 H784 A16,16 0 0 1 800,78 V236 A16,16 0 0 1 784,252 H516 A16,16 0 0 1 500,236 V78 A16,16 0 0 1 516,62 Z" />
    <text x="650" y="118" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF" text-anchor="middle">改成区域净流量</text>
    <text x="650" y="176" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF" text-anchor="middle">dropoff - pickup</text>
    <path fill="#FFFFFF" stroke="#D8DEE5" d="M846,62 H1164 A16,16 0 0 1 1180,78 V236 A16,16 0 0 1 1164,252 H846 A16,16 0 0 1 830,236 V78 A16,16 0 0 1 846,62 Z" />
    <text x="860" y="112" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="700" fill="#E06A36">直接转成调度动作</text>
    <text font-size="18" font-family="Microsoft YaHei, Arial, sans-serif" fill="#1D2433" x="860" y="158">负值表示缺车风险，</text><text font-size="18" font-family="Microsoft YaHei, Arial, sans-serif" fill="#1D2433" x="860" y="188">正值表示满桩或拥堵风险，</text><text font-size="18" font-family="Microsoft YaHei, Arial, sans-serif" fill="#1D2433" x="860" y="218">输出就是再平衡优先级。</text></g>
  <path fill="#FFFFFF" stroke="#D8DEE5" d="M136,292 H612 A16,16 0 0 1 628,308 V602 A16,16 0 0 1 612,618 H136 A16,16 0 0 1 120,602 V308 A16,16 0 0 1 136,292 Z" />
  <rect x="120" y="292" width="508" height="14" fill="#0C6DB8" />
  <text x="154" y="350" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="700" fill="#0C6DB8">这一页要说清楚</text>
  <text font-size="18" font-family="Microsoft YaHei, Arial, sans-serif" fill="#1D2433" x="154" y="398">这次实验的重点不是单纯提高全市订单量预测，</text><text font-size="18" font-family="Microsoft YaHei, Arial, sans-serif" fill="#1D2433" x="154" y="430">而是把预测目标换成更贴近运营决策的</text><text font-size="18" font-family="Microsoft YaHei, Arial, sans-serif" fill="#1D2433" x="154" y="462">“区域车辆失衡”。所以后面所有模型指标、</text><text font-size="18" font-family="Microsoft YaHei, Arial, sans-serif" fill="#1D2433" x="154" y="494">空间特征和风险排序，都围绕净流量展开。</text><path fill="#FFFFFF" stroke="#D8DEE5" d="M684,292 H1164 A16,16 0 0 1 1180,308 V602 A16,16 0 0 1 1164,618 H684 A16,16 0 0 1 668,602 V308 A16,16 0 0 1 684,292 Z" />
  <rect x="668" y="292" width="512" height="14" fill="#E06A36" />
  <text x="704" y="350" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="700" fill="#E06A36">实验对象</text>
  <text font-size="18" font-family="Microsoft YaHei, Arial, sans-serif" fill="#1D2433" x="704" y="402">• Top 40 区域网格作为图节点</text><text font-size="18" font-family="Microsoft YaHei, Arial, sans-serif" fill="#1D2433" x="704" y="436">• 24 小时历史窗口预测下一小时</text><text font-size="18" font-family="Microsoft YaHei, Arial, sans-serif" fill="#1D2433" x="704" y="470">• 距离 kNN + 历史 OD 流量构造混合图</text><text font-size="18" font-family="Microsoft YaHei, Arial, sans-serif" fill="#1D2433" x="704" y="504">• 测试集覆盖 2026-04-07 至 2026-05-31</text><text x="1190" y="670" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#586070" text-anchor="end">02</text>
</svg>